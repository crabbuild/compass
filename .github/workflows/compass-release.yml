name: Release Compass for macOS

on:
  push:
    tags: ["compass-v*"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  metadata:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - name: Install pinned Rust toolchain
        uses: dtolnay/rust-toolchain@2c7215f132e9ebf062739d9130488b56d53c060c # master
        with:
          toolchain: 1.97.1
      - name: Validate release tag and workspace versions
        if: startsWith(github.ref, 'refs/tags/')
        shell: bash
        run: |
          versions="$(cargo metadata --no-deps --format-version 1 | jq -r '.packages[] | select(.name != "compass-tree-sitter-language-pack") | .version' | sort -u)"
          test "$(printf '%s\n' "$versions" | wc -l | tr -d ' ')" = "1"
          test "$GITHUB_REF_NAME" = "compass-v$versions"

  build:
    name: Build ${{ matrix.target }}
    needs: metadata
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-15-intel
            target: x86_64-apple-darwin
          - runner: macos-15
            target: aarch64-apple-darwin
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - name: Install pinned Rust toolchain
        uses: dtolnay/rust-toolchain@2c7215f132e9ebf062739d9130488b56d53c060c # master
        with:
          toolchain: 1.97.1
          target: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: .
          key: release-${{ matrix.target }}
      - name: Test Compass product contract
        run: cargo test -p compass-cli --test compass_product --locked
      - name: Test release scripts
        run: sh scripts/test_release_scripts.sh
      - name: Build locked Compass binary
        run: cargo build --release --locked -p compass-cli --bin compass --target ${{ matrix.target }}
      - name: Package macOS distribution
        run: >-
          scripts/package_macos.sh
          ${{ matrix.target }}
          target/${{ matrix.target }}/release/compass
          dist
      - name: Verify packaged Compass binary
        shell: bash
        run: |
          name="compass-${{ matrix.target }}"
          mkdir -p dist/verify
          tar -C dist/verify -xzf "dist/$name.tar.gz"
          "dist/verify/$name/compass" --version
          "dist/verify/$name/compass" query --help
          test -f "dist/verify/$name/LICENSE-MIT"
          test -f "dist/verify/$name/LICENSE-APACHE"
          test -f "dist/verify/$name/THIRD_PARTY_NOTICES.md"
          (cd dist && shasum -a 256 -c "$name.tar.gz.sha256")
      - name: Attest release archive
        uses: actions/attest-build-provenance@977bb373ede98d70efdf65b84cb5f73e068dcc2a # v3
        with:
          subject-path: dist/compass-${{ matrix.target }}.tar.gz
      - name: Upload release artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: compass-${{ matrix.target }}
          path: |
            dist/compass-${{ matrix.target }}.tar.gz
            dist/compass-${{ matrix.target }}.tar.gz.sha256
          if-no-files-found: error

  release:
    if: startsWith(github.ref, 'refs/tags/compass-v')
    needs: build
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: actions/download-artifact@634f93cb2916e3fdff6788551b99b062d0335ce0 # v5
        with:
          pattern: compass-*
          path: dist
          merge-multiple: true
      - name: Publish GitHub release assets
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          generate_release_notes: true
          files: |
            dist/*
            scripts/install.sh
