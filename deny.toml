[graph]
all-features = true

[advisories]
version = 2
yanked = "deny"
ignore = [
  { id = "RUSTSEC-2024-0436", reason = "Candle's GEMM stack uses paste only as a compile-time proc macro; it contributes no runtime code, and Trail will remove this exception when Candle migrates to pastey" },
]

[licenses]
version = 2
confidence-threshold = 0.8
allow = [
  "Apache-2.0",
  "BSD-2-Clause",
  "BSD-3-Clause",
  "CC0-1.0",
  "CDLA-Permissive-2.0",
  "ISC",
  "MIT",
  "MPL-2.0",
  "NCSA",
  "Unicode-3.0",
  "Zlib",
]

[bans]
multiple-versions = "warn"
wildcards = "deny"
highlight = "all"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
