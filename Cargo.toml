[workspace]
members = [
    "crates/trail-cli",
    "crates/trail-core",
    "crates/trail-files",
    "crates/trail-graph",
    "crates/trail-languages",
    "crates/trail-model",
    "crates/trail-parity",
    "crates/trail-query",
    "crates/trail-resolve",
]
resolver = "3"

[workspace.package]
version = "0.1.0"
edition = "2024"
rust-version = "1.97"
license = "Apache-2.0"
repository = "https://github.com/Graphify-Labs/graphify"

[workspace.dependencies]
serde = { version = "1", features = ["derive"] }
serde_json = { version = "1", features = ["preserve_order"] }
sha2 = "0.10"
sha1 = "0.10"
md-5 = "0.10"
strsim = "0.11"
rayon = "1"
regex = "1"
flate2 = "1.1.9"
roxmltree = "0.21.1"
serde_yaml_ng = "0.10.0"
thiserror = "2"
toml = { version = "1.1.3", features = ["preserve_order"] }
unicode-normalization = "0.1"
unicode-casefold = "0.2"
tempfile = "3"
tree-sitter = "0.26"
tree-sitter-dm = "0.25.1"
tree-sitter-language-pack = { version = "=1.13.1", default-features = false }

[workspace.lints.rust]
unsafe_code = "forbid"

[workspace.lints.clippy]
all = { level = "deny", priority = -1 }
unwrap_used = "deny"
expect_used = "deny"
panic = "deny"
